<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô phỏng Duyệt Mảng với Code Animation</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #fff;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            color: #64dfdf;
        }
        
        .description {
            font-size: 1.2rem;
            max-width: 900px;
            margin: 0 auto 20px;
            line-height: 1.6;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            color: #e2e2e2;
        }
        
        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 10px;
        }
        
        .simulation-section {
            flex: 1;
            min-width: 300px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        .code-section {
            flex: 1;
            min-width: 300px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #64dfdf;
            text-align: center;
        }
        
        .array-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }
        
        .array-element {
            width: 60px;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #1e6f5c;
            border-radius: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .array-element.index {
            font-size: 0.9rem;
            color: #ffcc00;
            margin-top: 5px;
        }
        
        .array-element.active {
            background-color: #e63946;
            transform: scale(1.1);
            box-shadow: 0 0 20px #e63946;
        }
        
        .array-element.visited {
            background-color: #1d3557;
        }
        
        .array-element.target {
            background-color: #ff9e00;
            animation: pulse 1.5s infinite;
        }
        
        .array-element.sorted {
            background-color: #2ecc71;
        }
        
        .array-element.comparing {
            background-color: #f39c12;
            animation: pulse 1s infinite;
        }
        
        .array-element.swapping {
            background-color: #e74c3c;
            transform: scale(1.15);
            box-shadow: 0 0 30px #e74c3c;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .variables-panel {
            margin-top: 30px;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
        }
        
        .variables-panel h3 {
            color: #64dfdf;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        .variables-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .variable {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1.1rem;
            min-width: 150px;
        }
        
        .variable-name {
            color: #ffcc00;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .variable-value {
            font-size: 1.3rem;
            font-weight: bold;
        }
        
        .code-editor {
            background-color: #1e1e1e;
            border-radius: 10px;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 1.1rem;
            line-height: 1.5;
            overflow-x: auto;
            margin-bottom: 25px;
            height: 60vh;
            overflow-y: auto;
        }
        
        .code-line {
            padding: 3px 10px;
            margin: 2px 0;
            border-radius: 4px;
            transition: all 0.3s ease;
            white-space: pre;
            cursor: pointer;
        }
        
        .code-line.active {
            background-color: rgba(100, 223, 223, 0.2);
            border-left: 4px solid #64dfdf;
        }
        
        .code-line.executed {
            color: #64dfdf;
        }
        
        .code-line.comment {
            color: #6a9955;
        }
        
        .code-line.keyword {
            color: #569cd6;
        }
        
        .code-line.function {
            color: #dcdcaa;
        }
        
        .code-line.string {
            color: #ce9178;
        }
        
        .code-line.number {
            color: #b5cea8;
        }
        
        .code-line.operator {
            color: #d4d4d4;
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 25px;
        }
        
        .control-group {
            flex: 1;
            min-width: 200px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: #e2e2e2;
        }
        
        input, select, button {
            width: 100%;
            padding: 12px 15px;
            font-size: 1rem;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
        }
        
        input {
            background-color: rgba(255, 255, 255, 0.9);
        }
        
        select {
            background-color: rgba(255, 255, 255, 0.9);
        }
        
        button {
            background-color: #1e6f5c;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            background-color: #289672;
            transform: translateY(-3px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
            transform: none;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        
        .buttons button {
            flex: 1;
        }
        
        .speed-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }
        
        .speed-control input {
            flex: 1;
        }
        
        .speed-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffcc00;
            min-width: 50px;
        }
        
        .algorithm-info {
            margin-top: 30px;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
        }
        
        .algorithm-info h3 {
            color: #64dfdf;
            margin-bottom: 10px;
            font-size: 1.3rem;
        }
        
        .algorithm-info p {
            line-height: 1.6;
            color: #e2e2e2;
        }
        
        .code-output {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            margin-top: 15px;
            white-space: pre-wrap;
            line-height: 1.5;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .output-line {
            margin-bottom: 5px;
            padding: 3px;
            border-radius: 3px;
        }
        
        .output-line.new {
            background-color: rgba(100, 223, 223, 0.1);
        }
        
        footer {
            text-align: center;
            width: 100%;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
  
        <div class="main-content">
            <section class="simulation-section">
                <h2>Mô phỏng trực quan</h2>
                
                <div class="array-container" id="arrayContainer">
                    <!-- Các phần tử mảng sẽ được tạo bằng JavaScript -->
                </div>
                
                <div class="variables-panel">
                    <h3>Biến đang theo dõi</h3>
                    <div class="variables-container" id="variablesContainer">
                        <!-- Các biến sẽ được thêm vào bằng JavaScript -->
                    </div>
                </div>
                
                <div class="algorithm-info">
                    <h3>Thông tin thuật toán</h3>
                    <div id="algorithmDescription">
                        <p><strong>Duyệt tuyến tính:</strong> Duyệt qua từng phần tử trong mảng từ đầu đến cuối. Độ phức tạp thời gian: O(n).</p>
                    </div>
                </div>
                
                <div class="controls">
                    <div class="control-group">
                        <label for="arrayInput">Nhập mảng (cách nhau bằng dấu phẩy):</label>
                        <input type="text" id="arrayInput" value="5, 12, 8, 21, 17, 9, 14, 3, 25, 19">
                    </div>
                    
                    <div class="control-group">
                        <label for="algorithmSelect">Chọn thuật toán:</label>
                        <select id="algorithmSelect">
                            <option value="linear">Duyệt tuyến tính</option>
                            <option value="search">Tìm kiếm giá trị</option>
                            <option value="findMax">Tìm giá trị lớn nhất</option>
                            <option value="findMin">Tìm giá trị nhỏ nhất</option>
                            <option value="sum">Tính tổng mảng</option>
                            <option value="bubbleSort">Sắp xếp nổi bọt (Bubble Sort)</option>
                        </select>
                    </div>
                </div>
                
                <div class="controls">
                    <div class="control-group" id="searchValueGroup">
                        <label for="searchValue">Giá trị cần tìm:</label>
                        <input type="number" id="searchValue" value="14" onchange="handleSearchValueChange()">
                    </div>
                    
                    <div class="control-group">
                        <label>Tốc độ mô phỏng:</label>
                        <div class="speed-control">
                            <input type="range" id="speedControl" min="300" max="2000" value="800" step="100">
                            <div class="speed-value" id="speedValue">800ms</div>
                        </div>
                    </div>
                </div>
                
                <div class="buttons">
                    <button id="startBtn">Bắt đầu mô phỏng</button>
                    <button id="pauseBtn" style="display: none;">Tạm dừng</button>
                    <button id="stepBtn" disabled>Bước tiếp theo</button>
                    <button id="resetBtn">Tạo mảng mới</button>
                </div>
            </section>
            
            <section class="code-section">
                <h2>Code đang thực thi</h2>
                
                <div class="code-editor" id="codeEditor">
                    <!-- Code sẽ được thêm vào bằng JavaScript -->
                </div>
                
                <div class="code-output">
                    <h3>Kết quả in ra</h3>
                    <div id="outputContainer">
                        <!-- Kết quả sẽ được thêm vào bằng JavaScript -->
                    </div>
                </div>
            </section>
        </div>
        
        <footer>
            <p>GV: Nguyễn Đình Mạnh</p>
        </footer>
    </div>

    <script>
        // DOM Elements
        const arrayContainer = document.getElementById('arrayContainer');
        const variablesContainer = document.getElementById('variablesContainer');
        const codeEditor = document.getElementById('codeEditor');
        const outputContainer = document.getElementById('outputContainer');
        const arrayInput = document.getElementById('arrayInput');
        const algorithmSelect = document.getElementById('algorithmSelect');
        const searchValueGroup = document.getElementById('searchValueGroup');
        const searchValueInput = document.getElementById('searchValue');
        const speedControl = document.getElementById('speedControl');
        const speedValue = document.getElementById('speedValue');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stepBtn = document.getElementById('stepBtn');
        const resetBtn = document.getElementById('resetBtn');
        const algorithmDescription = document.getElementById('algorithmDescription');
        
        // Biến toàn cục
        let array = [];
        let isAnimating = false;
        let animationSpeed = 800;
        let currentAlgorithm = 'linear';
        let codeLines = [];
        let currentLineIndex = 0;
        let variables = {};
        let animationInterval;
        let isStepByStep = false;
        let visitedElements = [];
        let loopStack = []; // Ngăn xếp lưu trữ vòng lặp
        let simulationState = 'stopped'; // 'stopped', 'running', 'paused'
        let actionChangedLineIndex = false;
        let originalArray = []; // Lưu mảng gốc cho bubble sort
        
        // Các code mẫu cho từng thuật toán
        const algorithmCodes = {
            linear: [
                {code: "// Duyệt tuyến tính qua mảng", type: "comment"},
                {code: "for (let i = 0; i < array.length; i++) {", type: "keyword", action: "startForLoop", loopStart: true},
                {code: "    // In giá trị phần tử hiện tại", type: "comment"},
                {code: "    console.log('Phần tử tại vị trí ' + i + ': ' + array[i]);", type: "function", action: "logElement"},
                {code: "    // Đánh dấu đã duyệt phần tử này", type: "comment"},
                {code: "    markVisited(i);", type: "function", action: "markVisited"},
                {code: "}", type: "keyword", action: "endLoop", loopEnd: true}
            ],
            search: [
                {code: "// Tìm kiếm giá trị trong mảng", type: "comment"},
                {code: "let target = 14; // Giá trị cần tìm", type: "keyword", action: "setTarget"},
                {code: "let found = false;", type: "keyword", action: "initFound"},
                {code: "let foundIndex = -1;", type: "keyword", action: "initFoundIndex"},
                {code: "for (let i = 0; i < array.length; i++) {", type: "keyword", action: "startForLoop", loopStart: true},
                {code: "    // Kiểm tra nếu tìm thấy giá trị", type: "comment"},
                {code: "    if (array[i] === target) {", type: "keyword", action: "checkIfEqual"},
                {code: "        found = true;", type: "operator", action: "setFoundTrue"},
                {code: "        foundIndex = i;", type: "operator", action: "setFoundIndex"},
                {code: "        console.log('Tìm thấy ' + target + ' tại vị trí ' + i);", type: "function", action: "logFound"},
                {code: "        break; // Dừng vòng lặp khi tìm thấy", type: "keyword", action: "breakLoop"},
                {code: "    }", type: "keyword"},
                {code: "    console.log('Không tìm thấy ' + target + ' tại vị trí ' + i);", type: "function", action: "logNotFound"},
                {code: "    markVisited(i);", type: "function", action: "markVisited"},
                {code: "}", type: "keyword", action: "endLoop", loopEnd: true},
                {code: "if (!found) {", type: "keyword", action: "checkIfNotFound"},
                {code: "    console.log('Không tìm thấy ' + target + ' trong mảng');", type: "function", action: "logFinalNotFound"},
                {code: "}", type: "keyword"}
            ],
            findMax: [
                {code: "// Tìm giá trị lớn nhất trong mảng", type: "comment"},
                {code: "let max = array[0]; // Giả sử phần tử đầu tiên là lớn nhất", type: "keyword", action: "initMax"},
                {code: "let maxIndex = 0;", type: "keyword", action: "initMaxIndex"},
                {code: "console.log('Khởi tạo: max = ' + max + ' tại vị trí ' + maxIndex);", type: "function", action: "logInitMax"},
                {code: "markTarget(0);", type: "function", action: "markTarget"},
                {code: "for (let i = 1; i < array.length; i++) {", type: "keyword", action: "startForLoopFrom1", loopStart: true},
                {code: "    // So sánh phần tử hiện tại với max", type: "comment"},
                {code: "    if (array[i] > max) {", type: "keyword", action: "checkIfGreater"},
                {code: "        max = array[i];", type: "operator", action: "updateMax"},
                {code: "        maxIndex = i;", type: "operator", action: "updateMaxIndex"},
                {code: "        console.log('Cập nhật: max = ' + max + ' tại vị trí ' + maxIndex);", type: "function", action: "logUpdateMax"},
                {code: "        markTarget(i);", type: "function", action: "markTarget"},
                {code: "    } else {", type: "keyword"},
                {code: "        console.log('Giữ nguyên: max = ' + max + ', array[' + i + '] = ' + array[i]);", type: "function", action: "logKeepMax"},
                {code: "    }", type: "keyword"},
                {code: "    markVisited(i);", type: "function", action: "markVisited"},
                {code: "}", type: "keyword", action: "endLoop", loopEnd: true},
                {code: "console.log('Giá trị lớn nhất là ' + max + ' tại vị trí ' + maxIndex);", type: "function", action: "logFinalMax"}
            ],
            findMin: [
                {code: "// Tìm giá trị nhỏ nhất trong mảng", type: "comment"},
                {code: "let min = array[0]; // Giả sử phần tử đầu tiên là nhỏ nhất", type: "keyword", action: "initMin"},
                {code: "let minIndex = 0;", type: "keyword", action: "initMinIndex"},
                {code: "console.log('Khởi tạo: min = ' + min + ' tại vị trí ' + minIndex);", type: "function", action: "logInitMin"},
                {code: "markTarget(0);", type: "function", action: "markTarget"},
                {code: "for (let i = 1; i < array.length; i++) {", type: "keyword", action: "startForLoopFrom1", loopStart: true},
                {code: "    // So sánh phần tử hiện tại với min", type: "comment"},
                {code: "    if (array[i] < min) {", type: "keyword", action: "checkIfSmaller"},
                {code: "        min = array[i];", type: "operator", action: "updateMin"},
                {code: "        minIndex = i;", type: "operator", action: "updateMinIndex"},
                {code: "        console.log('Cập nhật: min = ' + min + ' tại vị trí ' + minIndex);", type: "function", action: "logUpdateMin"},
                {code: "        markTarget(i);", type: "function", action: "markTarget"},
                {code: "    } else {", type: "keyword"},
                {code: "        console.log('Giữ nguyên: min = ' + min + ', array[' + i + '] = ' + array[i]);", type: "function", action: "logKeepMin"},
                {code: "    }", type: "keyword"},
                {code: "    markVisited(i);", type: "function", action: "markVisited"},
                {code: "}", type: "keyword", action: "endLoop", loopEnd: true},
                {code: "console.log('Giá trị nhỏ nhất là ' + min + ' tại vị trí ' + minIndex);", type: "function", action: "logFinalMin"}
            ],
            sum: [
                {code: "// Tính tổng các phần tử trong mảng", type: "comment"},
                {code: "let sum = 0; // Khởi tạo biến tổng", type: "keyword", action: "initSum"},
                {code: "console.log('Khởi tạo: sum = ' + sum);", type: "function", action: "logInitSum"},
                {code: "for (let i = 0; i < array.length; i++) {", type: "keyword", action: "startForLoop", loopStart: true},
                {code: "    // Cộng dồn giá trị phần tử hiện tại vào tổng", type: "comment"},
                {code: "    sum = sum + array[i];", type: "operator", action: "addToSum"},
                {code: "    console.log('Sau khi cộng array[' + i + '] = ' + array[i] + ': sum = ' + sum);", type: "function", action: "logSumUpdate"},
                {code: "    markVisited(i);", type: "function", action: "markVisited"},
                {code: "}", type: "keyword", action: "endLoop", loopEnd: true},
                {code: "console.log('Tổng các phần tử trong mảng là: ' + sum);", type: "function", action: "logFinalSum"},
                {code: "let average = sum / array.length;", type: "keyword", action: "calculateAverage"},
                {code: "console.log('Giá trị trung bình là: ' + average.toFixed(2));", type: "function", action: "logAverage"}
            ],
            bubbleSort: [
                {code: "// Sắp xếp nổi bọt (Bubble Sort)", type: "comment"},
                {code: "let n = array.length;", type: "keyword", action: "initN"},
                {code: "console.log('Bắt đầu sắp xếp mảng. Độ dài mảng: ' + n);", type: "function", action: "logBubbleStart"},
                {code: "for (let i = 0; i < n - 1; i++) {", type: "keyword", action: "startOuterLoop", loopStart: true},
                {code: "    let swapped = false; // Biến kiểm tra có hoán đổi không", type: "keyword", action: "initSwapped"},
                {code: "    console.log('Lần lặp thứ ' + (i + 1) + ':');", type: "function", action: "logOuterIteration"},
                {code: "    for (let j = 0; j < n - i - 1; j++) {", type: "keyword", action: "startInnerLoop", innerLoopStart: true},
                {code: "        // So sánh hai phần tử liền kề", type: "comment"},
                {code: "        markComparing(j, j + 1);", type: "function", action: "markComparing"},
                {code: "        console.log('  So sánh array[' + j + '] = ' + array[j] + ' với array[' + (j+1) + '] = ' + array[j+1]);", type: "function", action: "logComparison"},
                {code: "        if (array[j] > array[j + 1]) {", type: "keyword", action: "checkIfGreaterSwap"},
                {code: "            // Hoán đổi hai phần tử", type: "comment"},
                {code: "            markSwapping(j, j + 1);", type: "function", action: "markSwapping"},
                {code: "            console.log('    ' + array[j] + ' > ' + array[j+1] + ', cần hoán đổi');", type: "function", action: "logSwapNeeded"},
                {code: "            let temp = array[j];", type: "operator", action: "initTemp"},
                {code: "            array[j] = array[j + 1];", type: "operator", action: "swapFirst"},
                {code: "            array[j + 1] = temp;", type: "operator", action: "swapSecond"},
                {code: "            swapped = true;", type: "operator", action: "setSwappedTrue"},
                {code: "            console.log('    Hoán đổi: array[' + j + '] = ' + array[j] + ', array[' + (j+1) + '] = ' + array[j+1]);", type: "function", action: "logSwapResult"},

        // Hàm bắt đầu mô phỏng

            if (inputArray.length === 0) {

                return;
            }
            
            // Cập nhật mảng
            array = [...inputArray];

            if (currentAlgorithm === 'bubbleSort' && originalArray.length > 0) {
                array = [...originalArray];

                originalArray = [...array];
            }
            renderArray();
            
            // Reset trạng thái

            isAnimating = false;
            loopStack = [];

            initializeVariables();
            updateVariablesPanel();

        // Hàm thêm output
        function addOutput(text) {

        // Hàm thực thi code
        function executeCode() {
            // Xóa interval cũ nếu có
            if (animationInterval) {
                clearInterval(animationInterval);
            }
            
            // Thực thi từng bước
            animationInterval = setInterval(() => {
                if (!isAnimating) {
                    return;
                }
                
                if (currentLineIndex >= codeLines.length) {
                    finishSimulation();
                    return;
                }
                
                executeNextStep();
            }, animationSpeed);
        }
        
        // Hàm kết thúc mô phỏng
        function finishSimulation() {
            clearInterval(animationInterval);
            simulationState = 'stopped';
            isAnimating = false;
            
            // Cập nhật nút
            startBtn.textContent = 'Bắt đầu lại';
            startBtn.style.display = 'block';
            pauseBtn.style.display = 'none';
            stepBtn.disabled = true;
        }
        
        // Hàm thực thi bước tiếp theo
        function executeNextStep() {
            if (currentLineIndex >= codeLines.length) {
                finishSimulation();
                return;
            }
            
            // Lấy dòng code hiện tại
            const currentLine = codeLines[currentLineIndex];
            const lineElement = document.getElementById(`code-line-${currentLineIndex}`);
            
            // Kiểm tra nếu không tìm thấy element
            if (!lineElement) {
                currentLineIndex++;
                return;
            }
            
            // Đánh dấu dòng code đang thực thi
            document.querySelectorAll('.code-line').forEach(line => {
                line.classList.remove('active');
            });
            lineElement.classList.add('active');
            
            // Thực thi hành động tương ứng
            if (currentLine.action) {
                executeAction(currentLine.action, currentLine);
            }
            
            lineElement.classList.add('executed');
            
            // Di chuyển đến dòng tiếp theo, trừ khi hành động đã thay đổi currentLineIndex
            if (!actionChangedLineIndex) {
                currentLineIndex++;
            }
            
            // Reset flag
            actionChangedLineIndex = false;
            
            // Cập nhật panel biến
            updateVariablesPanel();
        }
        
        // Hàm khởi tạo biến
        function initializeVariables() {
            variables = {};
            visitedElements = [];
            
            switch(currentAlgorithm) {
                case 'linear':
                    variables.i = 0;
                    break;
                case 'search':
                    variables.i = 0;
                    variables.target = parseInt(searchValueInput.value) || 14;
                    variables.found = false;
                    variables.foundIndex = -1;
                    break;
                case 'findMax':
                    variables.i = 1;
                    variables.max = array[0];
                    variables.maxIndex = 0;
                    break;
                case 'findMin':
                    variables.i = 1;
                    variables.min = array[0];
                    variables.minIndex = 0;
                    break;
                case 'sum':
                    variables.i = 0;
                    variables.sum = 0;
                    break;
                case 'bubbleSort':
                    variables.i = 0;
                    variables.j = 0;
                    variables.n = array.length;
                    variables.swapped = false;
                    variables.temp = null;
                    break;
            }
        }
        
        // Hàm thực thi hành động
        function executeAction(action, currentLine) {
            switch(action) {
                // Các hành động cho thuật toán cơ bản
                case 'startForLoop':
                    if (currentLine.loopStart) {
                        // Push vòng lặp vào stack
                        loopStack.push({
                            type: 'for',
                            startIndex: currentLineIndex,
                            variable: 'i',
                            currentValue: variables.i,
                            maxValue: array.length
                        });
                        
                        if (variables.i >= array.length) {
                            currentLineIndex = findLoopEndIndex(currentLineIndex);
                            actionChangedLineIndex = true;
                            loopStack.pop();
                        } else {
                            highlightCurrentElement();
                        }
                    }
                    break;
                    
                case 'startForLoopFrom1':
                    if (currentLine.loopStart) {
                        loopStack.push({
                            type: 'for',
                            startIndex: currentLineIndex,
                            variable: 'i',
                            currentValue: variables.i,
                            maxValue: array.length
                        });
                        
                        if (variables.i >= array.length) {
                            currentLineIndex = findLoopEndIndex(currentLineIndex);
                            actionChangedLineIndex = true;
                            loopStack.pop();
                        } else {
                            highlightCurrentElement();
                        }
                    }
                    break;
                    
                case 'logElement':
                    addOutput(`Phần tử tại vị trí ${variables.i}: ${array[variables.i]}`);
                    break;
                    
                case 'markVisited':
                    markElementVisited(variables.i);
                    variables.i++;
                    
                    if (loopStack.length > 0) {
                        const loop = loopStack[loopStack.length - 1];
                        if (variables.i < loop.maxValue) {
                            currentLineIndex = loop.startIndex;
                            actionChangedLineIndex = true;
                        } else {
                            loopStack.pop();
                        }
                    }
                    break;
                    
                case 'markVisitedInner':
                    // Đánh dấu phần tử đã duyệt trong inner loop của bubble sort
                    if (variables.j < array.length) {
                        markElementVisited(variables.j);
                    }
                    break;
                    
                case 'endLoop':
                    if (currentLine.loopEnd) {
                        // Kết thúc vòng lặp
                    }
                    break;
                    
                case 'setTarget':
                    variables.target = parseInt(searchValueInput.value) || 14;
                    break;
                    
                case 'initFound':
                    variables.found = false;
                    break;
                    
                case 'initFoundIndex':
                    variables.foundIndex = -1;
                    break;
                    
                case 'checkIfEqual':
                    if (array[variables.i] !== variables.target) {
                        let foundIndex = -1;
                        for (let i = currentLineIndex + 1; i < codeLines.length; i++) {
                            if (codeLines[i].action === 'logNotFound') {
                                foundIndex = i;
                                break;
                            }
                        }
                        
                        if (foundIndex !== -1) {
                            currentLineIndex = foundIndex;
                            actionChangedLineIndex = true;
                        }
                    }
                    break;
                    
                case 'setFoundTrue':
                    variables.found = true;
                    break;
                    
                case 'setFoundIndex':
                    variables.foundIndex = variables.i;
                    markElementTarget(variables.i);
                    break;
                    
                case 'logFound':
                    addOutput(`Tìm thấy ${variables.target} tại vị trí ${variables.i}`);
                    break;
                    
                case 'breakLoop':
                    const loopEndIdx = findLoopEndIndex(currentLineIndex);
                    if (loopEndIdx !== -1) {
                        currentLineIndex = loopEndIdx;
                        actionChangedLineIndex = true;
                    }
                    break;
                    
                case 'logNotFound':
                    addOutput(`Không tìm thấy ${variables.target} tại vị trí ${variables.i}`);
                    markElementVisited(variables.i);
                    variables.i++;
                    
                    if (loopStack.length > 0) {
                        const loop = loopStack[loopStack.length - 1];
                        if (variables.i < loop.maxValue) {
                            currentLineIndex = loop.startIndex;
                            actionChangedLineIndex = true;
                        } else {
                            loopStack.pop();
                        }
                    }
                    break;
                    
                case 'checkIfNotFound':
                    if (variables.found) {
                        let endIfIndex = -1;
                        for (let i = currentLineIndex + 1; i < codeLines.length; i++) {
                            if (codeLines[i].code === '}') {
                                endIfIndex = i;
                                break;
                            }
                        }
                        
                        if (endIfIndex !== -1) {
                            currentLineIndex = endIfIndex;
                            actionChangedLineIndex = true;
                        }
                    }
                    break;
                    
                case 'logFinalNotFound':
                    addOutput(`Không tìm thấy ${variables.target} trong mảng`);
                    break;
                    
                case 'initMax':
                    variables.max = array[0];
                    break;
                    
                case 'initMaxIndex':
                    variables.maxIndex = 0;
                    break;
                    
                case 'logInitMax':
                    addOutput(`Khởi tạo: max = ${variables.max} tại vị trí ${variables.maxIndex}`);
                    break;
                    
                case 'markTarget':
                    markElementTarget(variables.i === undefined ? 0 : variables.i);
                    break;
                    
                case 'checkIfGreater':
                    if (array[variables.i] <= variables.max) {
                        let elseIndex = -1;
                        for (let i = currentLineIndex + 1; i < codeLines.length; i++) {
                            if (codeLines[i].action === 'logKeepMax') {
                                elseIndex = i;
                                break;
                            }
                        }
                        
                        if (elseIndex !== -1) {
                            currentLineIndex = elseIndex;
                            actionChangedLineIndex = true;
                        }
                    }
                    break;
                    
                case 'updateMax':
                    variables.max = array[variables.i];
                    break;
                    
                case 'updateMaxIndex':
                    variables.maxIndex = variables.i;
                    break;
                    
                case 'logUpdateMax':
                    addOutput(`Cập nhật: max = ${variables.max} tại vị trí ${variables.maxIndex}`);
                    markElementVisited(variables.i);
                    variables.i++;
                    
                    if (loopStack.length > 0) {
                        const loop = loopStack[loopStack.length - 1];
                        if (variables.i < loop.maxValue) {
                            currentLineIndex = loop.startIndex;
                            actionChangedLineIndex = true;
                        } else {
                            loopStack.pop();
                        }
                    }
                    break;
                    
                case 'logKeepMax':
                    addOutput(`Giữ nguyên: max = ${variables.max}, array[${variables.i}] = ${array[variables.i]}`);
                    markElementVisited(variables.i);
                    variables.i++;
                    
                    if (loopStack.length > 0) {
                        const loop = loopStack[loopStack.length - 1];
                        if (variables.i < loop.maxValue) {
                            currentLineIndex = loop.startIndex;
                            actionChangedLineIndex = true;
                        } else {
                            loopStack.pop();
                        }
                    }
                    break;
                    
                case 'logFinalMax':
                    addOutput(`Giá trị lớn nhất là ${variables.max} tại vị trí ${variables.maxIndex}`);
                    break;
                    
                case 'initMin':
                    variables.min = array[0];
                    break;
                    
                case 'initMinIndex':
                    variables.minIndex = 0;
                    break;
                    
                case 'logInitMin':
                    addOutput(`Khởi tạo: min = ${variables.min} tại vị trí ${variables.minIndex}`);
                    break;
                    
                case 'checkIfSmaller':
                    if (array[variables.i] >= variables.min) {
                        let elseIndex = -1;
                        for (let i = currentLineIndex + 1; i < codeLines.length; i++) {
                            if (codeLines[i].action === 'logKeepMin') {
                                elseIndex = i;
                                break;
                            }
                        }
                        
                        if (elseIndex !== -1) {
                            currentLineIndex = elseIndex;
                            actionChangedLineIndex = true;
                        }
                    }
                    break;
                    
                case 'updateMin':
                    variables.min = array[variables.i];
                    break;
                    
                case 'updateMinIndex':
                    variables.minIndex = variables.i;
                    break;
                    
                case 'logUpdateMin':
                    addOutput(`Cập nhật: min = ${variables.min} tại vị trí ${variables.minIndex}`);
                    markElementVisited(variables.i);
                    variables.i++;
                    
                    if (loopStack.length > 0) {
                        const loop = loopStack[loopStack.length - 1];
                        if (variables.i < loop.maxValue) {
                            currentLineIndex = loop.startIndex;
                            actionChangedLineIndex = true;
                        } else {
                            loopStack.pop();
                        }
                    }
                    break;
                    
                case 'logKeepMin':
                    addOutput(`Giữ nguyên: min = ${variables.min}, array[${variables.i}] = ${array[variables.i]}`);
                    markElementVisited(variables.i);
                    variables.i++;
                    
                    if (loopStack.length > 0) {
                        const loop = loopStack[loopStack.length - 1];
                        if (variables.i < loop.maxValue) {
                            currentLineIndex = loop.startIndex;
                            actionChangedLineIndex = true;
                        } else {
                            loopStack.pop();
                        }
                    }
                    break;
                    
                case 'logFinalMin':
                    addOutput(`Giá trị nhỏ nhất là ${variables.min} tại vị trí ${variables.minIndex}`);
                    break;
                    
                case 'initSum':
                    variables.sum = 0;
                    break;
                    
                case 'logInitSum':
                    addOutput(`Khởi tạo: sum = ${variables.sum}`);
                    break;
                    
                case 'addToSum':
                    variables.sum = (variables.sum || 0) + array[variables.i];
                    break;
                    
                case 'logSumUpdate':
                    addOutput(`Sau khi cộng array[${variables.i}] = ${array[variables.i]}: sum = ${variables.sum}`);
                    markElementVisited(variables.i);
                    variables.i++;
                    
                    if (loopStack.length > 0) {
                        const loop = loopStack[loopStack.length - 1];
                        if (variables.i < loop.maxValue) {
                            currentLineIndex = loop.startIndex;
                            actionChangedLineIndex = true;
                        } else {
                            loopStack.pop();
                        }
                    }
                    break;
                    
                case 'logFinalSum':
                    addOutput(`Tổng các phần tử trong mảng là: ${variables.sum}`);
                    break;
                    
                case 'calculateAverage':
                    variables.average = variables.sum / array.length;
                    break;
                    
                case 'logAverage':
                    addOutput(`Giá trị trung bình là: ${variables.average.toFixed(2)}`);
                    break;
                    
                // Hành động cho Bubble Sort
                case 'initN':
                    variables.n = array.length;
                    break;
                    
                case 'logBubbleStart':
                    addOutput(`Bắt đầu sắp xếp mảng. Độ dài mảng: ${variables.n}`);
                    break;
                    
                case 'startOuterLoop':
                    if (currentLine.loopStart) {
                        loopStack.push({
                            type: 'outer',
                            startIndex: currentLineIndex,
                            variable: 'i',
                            currentValue: variables.i,
                            maxValue: variables.n - 1
                        });
                        
                        if (variables.i >= variables.n - 1) {
                            currentLineIndex = findLoopEndIndex(currentLineIndex);
                            actionChangedLineIndex = true;
                            loopStack.pop();
                        }
                    }
                    break;
                    
                case 'initSwapped':
                    variables.swapped = false;
                    break;
                    
                case 'logOuterIteration':
                    addOutput(`Lần lặp thứ ${variables.i + 1}:`);
                    break;
                    
                case 'startInnerLoop':
                    if (currentLine.innerLoopStart) {
                        loopStack.push({
                            type: 'inner',
                            startIndex: currentLineIndex,
                            variable: 'j',
                            currentValue: 0,
                            maxValue: variables.n - variables.i - 1
                        });
                        variables.j = 0;
                        
                        if (variables.j >= variables.n - variables.i - 1) {
                            let innerEndIndex = -1;
                            for (let i = currentLineIndex; i < codeLines.length; i++) {
                                if (codeLines[i].innerLoopEnd) {
                                    innerEndIndex = i;
                                    break;
                                }
                            }
                            if (innerEndIndex !== -1) {
                                currentLineIndex = innerEndIndex;
                                actionChangedLineIndex = true;
                            }
                            loopStack.pop();
                        }
                    }
                    break;
                    
                case 'markComparing':
                    markComparing(variables.j, variables.j + 1);
                    break;
                    
                case 'logComparison':
                    addOutput(`  So sánh array[${variables.j}] = ${array[variables.j]} với array[${variables.j+1}] = ${array[variables.j+1]}`);
                    break;
                    
                case 'checkIfGreaterSwap':
                    if (array[variables.j] <= array[variables.j + 1]) {
                        let elseIndex = -1;
                        for (let i = currentLineIndex + 1; i < codeLines.length; i++) {
                            if (codeLines[i].action === 'logNoSwap') {
                                elseIndex = i;
                                break;
                            }
                        }
                        
                        if (elseIndex !== -1) {
                            currentLineIndex = elseIndex;
                            actionChangedLineIndex = true;
                        }
                    }
                    break;
                    
                case 'markSwapping':
                    markSwapping(variables.j, variables.j + 1);
                    break;
                    
                case 'logSwapNeeded':
                    addOutput(`    ${array[variables.j]} > ${array[variables.j+1]}, cần hoán đổi`);
                    break;
                    
                case 'initTemp':
                    variables.temp = array[variables.j];
                    break;
                    
                case 'swapFirst':
                    array[variables.j] = array[variables.j + 1];
                    break;
                    
                case 'swapSecond':
                    array[variables.j + 1] = variables.temp;
                    break;
                    
                case 'setSwappedTrue':
                    variables.swapped = true;
                    break;
                    
                case 'logSwapResult':
                    addOutput(`    Hoán đổi: array[${variables.j}] = ${array[variables.j]}, array[${variables.j+1}] = ${array[variables.j+1]}`);
                    break;
                    
                case 'renderArrayAfterSwap':
                    renderArray();
                    // Khôi phục đánh dấu swapping
                    setTimeout(() => {
                        const el1 = document.getElementById(`element-${variables.j}`);
                        const el2 = document.getElementById(`element-${variables.j+1}`);
                        if (el1) {
                            el1.classList.remove('swapping', 'comparing');
                            el1.classList.add('visited');
                        }
                        if (el2) {
                            el2.classList.remove('swapping', 'comparing');
                            el2.classList.add('visited');
                        }
                    }, 100);
                    break;
                    
                case 'logNoSwap':
                    addOutput(`    ${array[variables.j]} <= ${array[variables.j+1]}, không cần hoán đổi`);
                    break;
                    
                case 'clearComparing':
                    clearComparing();
                    break;
                    
                case 'endInnerLoop':
                    if (currentLine.innerLoopEnd) {
                        // Tăng j và kiểm tra điều kiện lặp
                        variables.j++;
                        const loop = loopStack[loopStack.length - 1];
                        
                        if (loop && loop.type === 'inner') {
                            if (variables.j < loop.maxValue) {
                                currentLineIndex = loop.startIndex;
                                actionChangedLineIndex = true;
                            } else {
                                loopStack.pop();
                            }
                        }
                    }
                    break;
                    
                case 'markSorted':
                    const sortedIndex = variables.n - variables.i - 1;
                    markElementSorted(sortedIndex);
                    break;
                    
                case 'checkIfNoSwap':
                    if (variables.swapped) {
                        let endIfIndex = -1;
                        for (let i = currentLineIndex + 1; i < codeLines.length; i++) {
                            if (codeLines[i].code === '    }') {
                                endIfIndex = i;
                                break;
                            }
                        }
                        
                        if (endIfIndex !== -1) {
                            currentLineIndex = endIfIndex;
                            actionChangedLineIndex = true;
                        }
                    }
                    break;
                    
                case 'logSorted':
                    addOutput('Không có hoán đổi nào trong lần lặp này. Mảng đã được sắp xếp!');
                    break;
                    
                case 'breakOuterLoop':
                    let outerEndIndex = findLoopEndIndex(currentLineIndex);
                    if (outerEndIndex !== -1) {
                        currentLineIndex = outerEndIndex;
                        actionChangedLineIndex = true;
                        loopStack.pop();
                    }
                    break;
                    
                case 'endOuterLoop':
                    if (currentLine.loopEnd) {
                        variables.i++;
                        const loop = loopStack[loopStack.length - 1];
                        
                        if (loop && loop.type === 'outer') {
                            if (variables.i < loop.maxValue) {
                                currentLineIndex = loop.startIndex;
                                actionChangedLineIndex = true;
                            } else {
                                loopStack.pop();
                            }
                        }
                    }
                    break;
                    
                case 'markAllSorted':
                    for (let i = 0; i < array.length; i++) {
                        markElementSorted(i);
                    }
                    break;
                    
                case 'logBubbleFinal':
                    addOutput(`Kết thúc sắp xếp. Mảng sau khi sắp xếp: [${array.join(', ')}]`);
                    break;
            }
        }
        
        // Hàm tìm vị trí kết thúc vòng lặp
        function findLoopEndIndex(startIndex) {
            let depth = 0;
            for (let i = startIndex; i < codeLines.length; i++) {
                if (codeLines[i].loopStart) depth++;
                if (codeLines[i].loopEnd) {
                    depth--;
                    if (depth === 0) return i;
                }
            }
            return -1;
        }
        
        // Hàm đánh dấu phần tử hiện tại
        function highlightCurrentElement() {
            document.querySelectorAll('.array-element').forEach(el => {
                el.classList.remove('active');
            });
            
            if (variables.i !== undefined && variables.i < array.length) {
                const element = document.getElementById(`element-${variables.i}`);
                if (element) {
                    element.classList.add('active');
                }
            }
        }
        
        // Hàm đánh dấu phần tử đã duyệt
        function markElementVisited(index) {
            if (index < array.length) {
                const element = document.getElementById(`element-${index}`);
                if (element) {
                    element.classList.remove('active', 'comparing', 'swapping');
                    element.classList.add('visited');
                }
            }
        }
        
        // Hàm đánh dấu phần tử mục tiêu
        function markElementTarget(index) {
            if (index < array.length) {
                document.querySelectorAll('.array-element').forEach(el => {
                    el.classList.remove('target');
                });
                
                const element = document.getElementById(`element-${index}`);
                if (element) {
                    element.classList.add('target');
                }
            }
        }
        
        // Hàm đánh dấu phần tử đã được sắp xếp
        function markElementSorted(index) {
            if (index < array.length) {
                const element = document.getElementById(`element-${index}`);
                if (element) {
                    element.classList.remove('active', 'visited', 'comparing', 'swapping');
                    element.classList.add('sorted');
                }
            }
        }
        
        // Hàm đánh dấu các phần tử đang so sánh
        function markComparing(index1, index2) {
            // Xóa đánh dấu cũ
            document.querySelectorAll('.array-element').forEach(el => {
                el.classList.remove('comparing');
            });
            
            if (index1 < array.length) {
                const element1 = document.getElementById(`element-${index1}`);
                if (element1) {
                    element1.classList.add('comparing');
                }
            }
            
            if (index2 < array.length) {
                const element2 = document.getElementById(`element-${index2}`);
                if (element2) {
                    element2.classList.add('comparing');
                }
            }
        }
        
        // Hàm đánh dấu các phần tử đang hoán đổi
        function markSwapping(index1, index2) {
            if (index1 < array.length) {
                const element1 = document.getElementById(`element-${index1}`);
                if (element1) {
                    element1.classList.remove('comparing');
                    element1.classList.add('swapping');
                }
            }
            
            if (index2 < array.length) {
                const element2 = document.getElementById(`element-${index2}`);
                if (element2) {
                    element2.classList.remove('comparing');
                    element2.classList.add('swapping');
                }
            }
        }
        
        // Hàm xóa đánh dấu so sánh
        function clearComparing() {
            document.querySelectorAll('.array-element').forEach(el => {
                el.classList.remove('comparing');
            });
        }
        
        // Hàm xử lý khi thay đổi giá trị tìm kiếm
        function handleSearchValueChange() {
            if (currentAlgorithm === 'search') {
                updateCodeDisplay();
            }
        }
    </script>
